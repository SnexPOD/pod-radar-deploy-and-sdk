map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream pod_radar_web {
    server 127.0.0.1:5174;
}

upstream pod_radar_backend {
    server 127.0.0.1:3001;
}

upstream pod_radar_crawler_web {
    server 127.0.0.1:5175;
}

upstream pod_radar_crawler_api {
    server 127.0.0.1:3002;
}

upstream pod_radar_minio {
    server network.jancsitech.net:9002;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Public object URLs for both main and crawler buckets.
    location ~ ^/(pod-radar-images|pod-radar-thumbs|pod-radar-docs|pod-radar-crawler-images|pod-radar-crawler-docs)/ {
        proxy_set_header Host network.jancsitech.net:9002;
        proxy_pass http://pod_radar_minio;
    }

    # Crawler backend API, used by crawler-web. /crawler-api/<route> maps onto the
    # versioned backend contract /api/v1/<route> (frontend + SDK unified on v1).
    location /crawler-api/ {
        proxy_pass http://pod_radar_crawler_api/api/v1/;
    }

    # Crawler Next.js assets. crawler-web sets assetPrefix=/crawler so its
    # static chunks do not collide with the main web app's /_next path.
    location /crawler/_next/ {
        proxy_pass http://pod_radar_crawler_web/_next/;
    }

    # Crawler UI. /crawler and /crawler/... are served by crawler-web.
    location = /crawler {
        proxy_pass http://pod_radar_crawler_web/crawler;
    }

    location /crawler/ {
        proxy_pass http://pod_radar_crawler_web/crawler/;
    }

    # Main backend API and OpenAPI docs. Unified on the versioned /api/v1/* contract.
    # The exact /api/v1/ prefix passes through unchanged (so SDK clients already
    # calling /api/v1/* are not double-prefixed); bare /api/* (legacy frontend +
    # old callers) is rewritten onto /api/v1/*. nginx picks the longest matching
    # prefix, so /api/v1/* hits the passthrough, not the rewrite.
    location /api/v1/ {
        proxy_pass http://pod_radar_backend/api/v1/;
    }

    location /api/ {
        proxy_pass http://pod_radar_backend/api/v1/;
    }

    location = /docs {
        proxy_pass http://pod_radar_backend/docs;
    }

    location = /openapi.json {
        proxy_pass http://pod_radar_backend/openapi.json;
    }

    # Main UI.
    location / {
        proxy_pass http://pod_radar_web;
    }
}
