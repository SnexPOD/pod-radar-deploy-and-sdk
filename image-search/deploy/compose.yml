name: pod-radar-main

# Main image-search system only.
#
# Start:
#   docker compose -f compose.yml up -d

x-log-options: &log-options
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-50m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-10}"

x-app-common: &app-common
  image: ${MAIN_IMAGE:-codedevin/pod-radar-main:v1.0.0}
  restart: unless-stopped
  logging: *log-options
  env_file:
    - ./.env
  volumes:
    - ./logs:/app/logs
    - ./data/app:/app/data

x-main-env: &main-env
  TZ: Asia/Shanghai
  DATA_DIR: /app/data
  HOST: 0.0.0.0
  PORT: "3001"
  WEB_HOST: 0.0.0.0
  # DB host/port 作变量:默认连内置 pgvector:5432。要整套指向【远程共享库】,
  # 在 .env 设 POSTGRES_HOST=<远程库IP/域名> POSTGRES_PORT=5544(并按需关掉内置 pgvector)。
  DATABASE_URL: postgres://${POSTGRES_USER:-pod_radar}:${POSTGRES_PASSWORD:-pod_radar_pass}@${POSTGRES_HOST:-pgvector}:${POSTGRES_PORT:-5432}/pod_radar
  # S3_* intentionally comes from .env. This compose stack does not start any
  # object storage; point S3_ENDPOINT / credentials at your OSS / S3-compatible store.
  BACKEND_URL: http://pod-radar-backend:3001
  # 封住 glibc malloc arena 碎片(默认上限 8×核数)——配合 sharp 处理大图防 RSS 单调
  # 增长。docker 部署必须在此显式设(对齐 crawler compose),否则容器内不生效。
  MALLOC_ARENA_MAX: "2"

services:
  pgvector:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    logging: *log-options
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pod_radar_pass}
      POSTGRES_USER: ${POSTGRES_USER:-pod_radar}
      POSTGRES_DB: pod_radar
    ports:
      - "${POSTGRES_HOST_BIND:-0.0.0.0}:${POSTGRES_HOST_PORT:-5544}:5432"
    volumes:
      # timescaledb-ha keeps PGDATA at /home/postgres/pgdata/data, NOT the stock
      # /var/lib/postgresql/data — bind-mounting the wrong path silently loses data.
      - ./data/pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pod_radar} -d pod_radar"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: 512mb
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=2GB
      -c max_connections=200
      -c random_page_cost=1.1

  # main-db-push:
  #   <<: *app-common
  #   restart: "no"
  #   environment:
  #     <<: *main-env
  #   depends_on:
  #     pgvector:
  #       condition: service_healthy
  #   command: ["pnpm", "db:push"]

  pod-radar-backend:
    <<: *app-common
    environment:
      <<: *main-env
      LOG_FILE: backend
    working_dir: /app/packages/backend
    depends_on:
      pgvector:
        condition: service_healthy
      # main-db-push:
      #   condition: service_completed_successfully
    ports:
      - "${BACKEND_HOST_BIND:-0.0.0.0}:${BACKEND_PORT:-3001}:3001"
    command: ["bun", "run", "start"]

  pod-radar-web:
    <<: *app-common
    environment:
      <<: *main-env
      LOG_FILE: web
    working_dir: /app/packages/web
    depends_on:
      pod-radar-backend:
        condition: service_started
    ports:
      - "${WEB_HOST_BIND:-0.0.0.0}:${WEB_PORT:-5174}:5174"
    command: ["pnpm", "start"]

  pod-radar-fetcher:
    <<: *app-common
    scale: ${MAIN_FETCHER_REPLICAS:-1}
    # 普通 fetcher：常规图小内存多并发；遇超大图 sharp 解码 OOM 时由 docker 到顶回收。
    # --max-attempts 2：同一张图被普通 fetcher 崩 2 次后不再 claim，留给高内存 fetcher。
    mem_limit: ${MAIN_FETCHER_MEM_LIMIT:-1500m}
    environment:
      <<: *main-env
      # 多副本会 tee 写同一 fetcher.log(O_APPEND 行级原子、可读可 grep);各副本细分看 docker logs。
      LOG_FILE: fetcher
    working_dir: /app/packages/workers
    depends_on:
      pod-radar-backend:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        exec bun run src/cli/fetch.ts \
          --batch "$${MAIN_FETCHER_BATCH:-8}" \
          --concurrency "$${MAIN_FETCHER_CONCURRENCY:-8}" \
          --max-attempts "$${MAIN_FETCHER_MAX_ATTEMPTS:-2}" \
          --oversized-mb "$${MAIN_FETCHER_OVERSIZED_MB:-40}"

  # 高内存 fetcher：专收普通 fetcher OOM 崩 ≥2 次(多为超大源图，如 9685×6142 / 上百MB)
  # 的行——普通 --max-attempts 2、此处 5，能 claim attempts 2~4 的；平时也帮抓普通图。
  # 大内存兜住大图 sharp 全解码(~1GB+；主系统源图比爬虫更大，默认 4096m 可按机型调高)。
  # 单实例、低并发避免多张大图同时占满。attempts≥5 由 worker 内 reapExhausted 判 failed。
  pod-radar-fetcher-highmem:
    <<: *app-common
    mem_limit: ${MAIN_FETCHER_HIGHMEM_LIMIT:-4096m}
    environment:
      <<: *main-env
      LOG_FILE: fetcher-highmem
    working_dir: /app/packages/workers
    depends_on:
      pod-radar-backend:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        exec bun run src/cli/fetch.ts \
          --batch "$${MAIN_HIGHMEM_BATCH:-4}" \
          --concurrency "$${MAIN_HIGHMEM_CONCURRENCY:-2}" \
          --max-attempts 5

  pod-radar-embed-worker:
    <<: *app-common
    scale: ${MAIN_EMBED_REPLICAS:-1}
    environment:
      <<: *main-env
      LOG_FILE: embed
    working_dir: /app/packages/workers
    depends_on:
      pod-radar-backend:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        exec bun run src/cli/embed.ts \
          --batch "$${MAIN_EMBED_BATCH:-8}" \
          --concurrency "$${MAIN_EMBED_CONCURRENCY:-4}"

  pod-radar-search-worker:
    <<: *app-common
    scale: ${MAIN_SEARCH_REPLICAS:-1}
    environment:
      <<: *main-env
      LOG_FILE: search
    working_dir: /app/packages/workers
    depends_on:
      pod-radar-backend:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        exec bun run src/cli/search.ts \
          --batch "$${MAIN_SEARCH_BATCH:-4}" \
          --concurrency "$${MAIN_SEARCH_CONCURRENCY:-4}"
