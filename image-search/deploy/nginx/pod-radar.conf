map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream pod_radar_web {
    server 127.0.0.1:5174;
}

upstream pod_radar_backend {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name radar.devinnet.top;
    client_max_body_size 100m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Main backend API and OpenAPI docs.
    location /api/ {
        proxy_pass http://pod_radar_backend/api/;
    }

    location = /docs {
        proxy_pass http://pod_radar_backend/docs;
    }

    location = /openapi.json {
        proxy_pass http://pod_radar_backend/openapi.json;
    }

    # Main UI.
    location / {
        proxy_pass http://pod_radar_web;
    }
}
